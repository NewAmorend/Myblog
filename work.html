<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amorend 的项目作品集，展示 AI Agent、医学影像、知识图谱、LLM 框架等工程实践。">
    <title>作品 - Amorend</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/site.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="assets/site.js" defer></script>
</head>
<body data-page="work">
    <header class="site-header">
        <a class="logo" href="index.html">Amorend</a>
        <nav class="nav-links" aria-label="主导航">
            <a href="index.html">首页</a>
            <a href="work.html" aria-current="page">作品</a>
            <a href="blog.html">博客</a>
            <a href="#contact">联系</a>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换明暗模式">
            <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7 7 0 1 0 11.6 11.6Z"/>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/>
            </svg>
        </button>
        <button class="menu-toggle" type="button" data-menu-toggle aria-label="打开导航" aria-expanded="false"><span></span></button>
    </header>

    <button class="icon-button music-toggle" type="button" data-music-toggle aria-label="播放背景音乐">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z"/>
        </svg>
    </button>
    <audio id="bg-music" loop>
        <source src="Music/在雨后醒来.mp3" type="audio/mpeg">
    </audio>

    <main class="page-main">
        <section class="page-header" aria-labelledby="page-title">
            <div class="page-header-inner">
                <p class="eyebrow">Project Archive / AI Systems / Product Engineering</p>
                <h1 class="page-title" id="page-title" data-split>Work</h1>
                <p class="page-subtitle">
                    这里收纳我做过或正在推进的系统项目。点击卡片可以阅读更完整的问题背景、技术路线和复盘。
                </p>
            </div>
        </section>

        <section class="listing-layout" aria-label="作品列表">
            <aside class="listing-side">
                <p data-work-count>-- 个项目</p>
                <a class="side-link" href="blog.html">查看文章</a>
            </aside>
            <div class="work-grid" data-work-list>
                <div class="loading-message" data-loading>作品加载中...</div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" data-modal-overlay>
        <div class="modal-content" data-modal-content role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-bar">
                <span class="work-code" data-modal-meta></span>
                <button class="modal-close" type="button" data-modal-close aria-label="关闭作品详情">×</button>
            </div>
            <h2 class="modal-title" id="modal-title" data-modal-title></h2>
            <div class="modal-body" data-modal-body></div>
        </div>
    </div>

    <footer class="site-footer" id="contact">
        <div class="footer-inner">
            <span>Amorend © 2026</span>
            <a href="mailto:evilgenius0256@gmail.com">evilgenius0256@gmail.com</a>
        </div>
    </footer>
</body>
</html>
