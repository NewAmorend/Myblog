<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amorend 的博客文章归档，覆盖 AI Agent、检索系统、推荐系统、计算机网络与持续学习。">
    <title>文章归档 - Amorend</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="assets/site.css">
    <script src="assets/site.js" defer></script>
</head>
<body data-page="blog">
    <header class="site-header">
        <a class="logo" href="index.html">Amorend</a>
        <nav class="nav-links" aria-label="主导航">
            <a href="index.html">首页</a>
            <a href="blog.html" aria-current="page">文章</a>
            <a href="work.html">项目</a>
            <a href="#contact">联系</a>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换明暗模式">
            <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7 7 0 1 0 11.6 11.6Z"/>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/>
            </svg>
        </button>
        <button class="menu-toggle" type="button" data-menu-toggle aria-label="打开导航" aria-expanded="false"><span></span></button>
    </header>

    <main class="page-main">
        <section class="page-header" aria-labelledby="page-title">
            <div class="page-header-inner">
                <p class="eyebrow">Archive</p>
                <h1 class="page-title" id="page-title">文章归档</h1>
                <p class="page-subtitle">按时间倒序整理所有公开笔记。主题会变，但基本目标不变：把复杂问题写成可以再次使用的理解。</p>
            </div>
        </section>

        <section class="listing-layout" aria-label="文章列表">
            <aside class="listing-side">
                <p data-blog-count>-- 篇文章</p>
                <a class="side-link" href="index.html">返回首页</a>
            </aside>
            <div class="article-list" data-blog-list>
                <div class="loading-message" data-loading>文章加载中...</div>
            </div>
        </section>
    </main>

    <footer class="site-footer" id="contact">
        <div class="footer-inner">
            <span>Amorend © 2026</span>
            <a href="mailto:evilgenius0256@gmail.com">evilgenius0256@gmail.com</a>
        </div>
    </footer>
</body>
</html>
