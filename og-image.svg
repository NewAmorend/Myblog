<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="sky" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#15140f"/>
      <stop offset="55%" stop-color="#0c0b0c"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <radialGradient id="eclipse" cx="44%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#e8e3d7" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#8a857a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0b0b0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="48%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- distant eclipse -->
  <circle cx="930" cy="250" r="210" fill="url(#eclipse)"/>
  <circle cx="930" cy="250" r="210" fill="none" stroke="#b8916a" stroke-opacity="0.4" stroke-width="0.8"/>
  <circle cx="1015" cy="185" r="4" fill="#b8916a"/>

  <!-- wind streaks -->
  <g stroke="#e8e3d7" fill="none" opacity="0.10">
    <path d="M-20 120 H1220" stroke-width="0.6"/>
    <path d="M-20 165 H820" stroke-width="0.6"/>
    <path d="M300 205 H1220" stroke-width="0.6"/>
    <path d="M-20 430 H640" stroke-width="0.6"/>
    <path d="M520 470 H1220" stroke-width="0.6"/>
    <path d="M-20 510 H1220" stroke-width="0.6"/>
  </g>

  <!-- the plain / horizon -->
  <line x1="0" y1="408" x2="1200" y2="408" stroke="#e8e3d7" stroke-opacity="0.55" stroke-width="1"/>
  <line x1="0" y1="412" x2="1200" y2="412" stroke="#e8e3d7" stroke-opacity="0.12" stroke-width="1"/>

  <rect width="1200" height="630" fill="url(#vig)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.5"/>

  <!-- top frame -->
  <line x1="64" y1="56" x2="1136" y2="56" stroke="#e8e3d7" stroke-opacity="0.2" stroke-width="0.8"/>

  <!-- eyebrow -->
  <text x="64" y="120"
        font-family="'JetBrains Mono','SF Mono',Monaco,monospace"
        font-size="20" letter-spacing="6"
        fill="#b8b3a8" opacity="0.85">
    AGENTS · RETRIEVAL · ENGINEERING NOTES
  </text>

  <!-- wordmark (serif) -->
  <text x="60" y="350"
        font-family="'Cormorant Garamond', Georgia, 'Songti SC', serif"
        font-size="168" font-style="italic" font-weight="500"
        fill="#e8e3d7" letter-spacing="-2">
    Amorend
  </text>

  <!-- tagline -->
  <text x="64" y="402"
        font-family="'Inter','Helvetica Neue','PingFang SC',sans-serif"
        font-size="27" font-weight="400" fill="#cfcab0">
    <tspan>把正在形成的技术判断，写下来。</tspan>
  </text>

  <!-- bottom -->
  <line x1="64" y1="560" x2="1136" y2="560" stroke="#e8e3d7" stroke-opacity="0.16" stroke-width="0.8"/>
  <text x="64" y="595"
        font-family="'JetBrains Mono','SF Mono',Monaco,monospace"
        font-size="20" font-weight="500" fill="#e8e3d7">
    amorend.top
  </text>
  <text x="1136" y="595" text-anchor="end"
        font-family="'JetBrains Mono','SF Mono',Monaco,monospace"
        font-size="18" fill="#e8e3d7" opacity="0.55" letter-spacing="3">
    THE WIND, UNCEASING — MMXXVI
  </text>
</svg>
