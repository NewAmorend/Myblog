<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amorend — 欢迎来到我的个人博客。AI Agent、检索系统、工程实践与阅读笔记。">
    <title>Amorend — 把判断写下来</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script>(function(){try{var t=localStorage.getItem('amorend-reading-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/site.css">
    <script src="assets/site.js" defer></script>
    <script src="assets/atmosphere.js" defer></script>
</head>
<body data-page="home">
    <div class="atmosphere" aria-hidden="true">
        <div class="atmo-fog"></div>
        <canvas class="atmo-dust"></canvas>
        <div class="atmo-grain"></div>
        <div class="atmo-vignette"></div>
    </div>
    <div class="frame-rule top" aria-hidden="true"></div>
    <div class="frame-rule bottom" aria-hidden="true"></div>

    <header class="site-header">
        <a class="logo" href="index.html">Amorend</a>
        <nav class="nav-links" aria-label="主导航">
            <a href="index.html" aria-current="page">Index</a>
            <a href="blog.html">Writings</a>
            <a href="#contact">Contact</a>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换明暗模式">
            <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7 7 0 1 0 11.6 11.6Z"/>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/>
            </svg>
        </button>
        <button class="menu-toggle" type="button" data-menu-toggle aria-label="打开导航" aria-expanded="false"><span></span></button>
    </header>

    <main class="site-main">
        <section class="site-intro hero-enter" aria-labelledby="page-title">
            <p class="eyebrow">All in Agents</p>
            <h1 id="page-title">An AI dev.</h1>
            <p>
                在这里记录我和AI的一切.
            </p>
            <div class="horizon" aria-hidden="true"></div>
        </section>

        <section class="section" aria-labelledby="latest-title" data-reveal>
            <div class="section-heading">
                <div>
                    <p class="kicker">— Latest</p>
                    <h2 id="latest-title">最近文章</h2>
                </div>
                <p><span data-post-count>--</span> entries</p>
            </div>
            <div class="post-list" data-home-posts>
                <div class="loading-message" data-loading>加载中 — loading</div>
            </div>
            <a class="text-link" href="blog.html">查看全部文章</a>
        </section>
    </main>

    <footer class="site-footer" id="contact">
        <div class="run-line">
            <span>The wind, unceasing.</span>
            <span>MMXXVI</span>
        </div>
        <div class="footer-inner">
            <span>Amorend © 2026</span>
            <a href="mailto:evilgenius0256@gmail.com">evilgenius0256@gmail.com</a>
        </div>
    </footer>
</body>
</html>
