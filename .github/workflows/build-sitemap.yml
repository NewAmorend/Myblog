name: Build sitemap

on:
  push:
    branches: [main]
    paths:
      - 'blog/index.json'
      - 'scripts/build-sitemap.mjs'
      - '.github/workflows/build-sitemap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap
        run: node scripts/build-sitemap.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet sitemap.xml; then
            echo "sitemap.xml unchanged, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore: 自动更新 sitemap.xml [skip ci]"
          git push
